<!DOCTYPE html>

  <title>ULTRA PIANO V46 PRO - 2026.07.21</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }
    .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(150,150,150,0.3); border-radius: 10px; }
    @keyframes flare {
      0% { transform: scale(0.3); opacity: 0.8; }
      100% { transform: scale(2.5); opacity: 0; }
    }
    .animate-flare {
      position: absolute;
      pointer-events: none;
      border-radius: 50%;
      border: 2px solid;
      width: 80px;
      height: 80px;
      animation: flare 0.8s cubic-bezier(0.1, 1, 0.2, 1) forwards;
      z-index: 2000;
    }
  </style>

        { id: 'bs5', n: "808 Sub", type: "sine", cutoff: 350, attack: 0.001, release: 2.0, octave: -2 }
      ],
      RETRO_8BIT: [
        { id: '8b1', n: "NES Square", type: "square", cutoff: 6000, attack: 0.001, release: 0.4 },
        { id: '8b2', n: "GameBoy Lead", type: "square", cutoff: 5000, attack: 0.001, release: 0.6 },
        { id: '8b3', n: "Chip Arp", type: "triangle", cutoff: 8000, attack: 0.001, release: 0.3 },
        { id: '8b4', n: "Retro Jump", type: "square", cutoff: 4000, attack: 0.001, release: 0.2 },
        { id: '8b5', n: "25% Pulse", type: "square", cutoff: 4500, attack: 0.001, release: 0.5 }
      ],
      LIMINAL_LOFI: [
        { id: 'lim1', n: "Cassette EP", type: "sine", cutoff: 1600, attack: 0.02, release: 2.2, vibrato: 2.0, vibratoSpeed: 3 },
        { id: 'lim2', n: "Mall Atmos", type: "triangle", cutoff: 1100, attack: 0.3, release: 4.0 },
        { id: 'lim3', n: "Vinyl Keys", type: "sine", cutoff: 1400, attack: 0.01, release: 1.8 },
        { id: 'lim4', n: "Midnight Mem", type: "sine", cutoff: 900, attack: 0.1, release: 3.5, octave: -1 },
        { id: 'lim5', n: "Dreamy Box", type: "triangle", cutoff: 2200, attack: 0.005, release: 3.0, octave: 1 }
      ],
      VIP_SPECIAL: [
        { id: 'v1', n: "Celestial Vox", type: "sine", cutoff: 2200, attack: 0.5, release: 5.0, vip: true },
        { id: 'v2', n: "Cyber Pulse", type: "sawtooth", cutoff: 3500, attack: 0.01, release: 2.0, vip: true },
        { id: 'v3', n: "Quantum Orch", type: "triangle", cutoff: 2800, attack: 0.2, release: 4.0, vip: true },
        { id: 'v4', n: "Deep Space", type: "sine", cutoff: 800, attack: 1.0, release: 7.0, vip: true },
        { id: 'v5', n: "July2026", type: "sine", cutoff: 2500, attack: 0.05, release: 3.5, vip: true }
      ]
    };

    // グローバル状態
    let state = {
      lang: 'ja',
      theme: 'black',
      volume: 70,
      keyWidth: 85,
      isVip: false,
      activeTone: SOUND_GROUPS.PIANO[0]
    };

    let audioCtx = null;
    let masterGain = null;

    // --- Web Audio 初期化 ---
    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();
        masterGain.gain.value = state.volume / 100;
        masterGain.connect(audioCtx.destination);
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    // --- 発音処理 (pointerdown一重発火) ---
    function playNote(freq, evt) {
      if (evt) {
        evt.preventDefault();
        evt.stopPropagation();
      }
      if (!audioCtx) initAudio();
      if (!audioCtx) return;

      const now = audioCtx.currentTime;
      const tone = state.activeTone;
      const octaveShift = tone.octave || 0;
      const actualFreq = freq * Math.pow(2, octaveShift);

      const osc = audioCtx.createOscillator();
      const filter = audioCtx.createBiquadFilter();
      const gainNode = audioCtx.createGain();

      osc.type = tone.type || 'sine';
      osc.frequency.setValueAtTime(actualFreq, now);

      filter.type = 'lowpass';
      filter.frequency.setValueAtTime(tone.cutoff || 3000, now);

      const attack = tone.attack || 0.01;
      const release = tone.release || 1.5;

      gainNode.gain.setValueAtTime(0, now);
      gainNode.gain.linearRampToValueAtTime(0.35, now + attack);
      gainNode.gain.exponentialRampToValueAtTime(0.0001, now + attack + release);

      // サブオシレーター
      if (tone.subType) {
        const subOsc = audioCtx.createOscillator();
        const subGain = audioCtx.createGain();
        subOsc.type = tone.subType;
        subOsc.frequency.setValueAtTime(actualFreq * (tone.subRatio || 0.5), now);
        subGain.gain.setValueAtTime(0.12, now);
        subOsc.connect(filter);
        subOsc.start(now);
        subOsc.stop(now + attack + release);
      }

      // 自然なビブラート
      if (tone.vibrato) {
        const lfo = audioCtx.createOscillator();
        const lfoGain = audioCtx.createGain();
        lfo.frequency.value = tone.vibratoSpeed || 5;
        lfoGain.gain.value = tone.vibrato;
        lfo.connect(osc.frequency);
        lfo.start(now);
        lfo.stop(now + attack + release);
      }

      osc.connect(filter);
      filter.connect(gainNode);
      gainNode.connect(masterGain);

      osc.start(now);
      osc.stop(now + attack + release);

      // エフェクトパーティクル生成
      if (evt) createParticle(evt.clientX || (evt.touches && evt.touches[0].clientX) || 0, evt.clientY || (evt.touches && evt.touches[0].clientY) || 0, freq);
    }

    function createParticle(x, y, freq) {
      if (!x || !y) return;
      const p = document.createElement('div');
      p.className = 'animate-flare';
      p.style.left = (x - 40) + 'px';
      p.style.top = (y - 40) + 'px';
      p.style.borderColor = `hsla(${freq % 360}, 85%, 55%, 0.5)`;
      document.getElementById('particles-container').appendChild(p);
      setTimeout(() => p.remove(), 800);
    }

    // --- ピアノ鍵盤データの計算 ---
    function buildPianoKeys() {
      const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
      const whiteKeys = [];
      const blackKeys = [];
      let whiteIndex = 0;

      for (let oct = 2; oct <= 6; oct++) {
        notes.forEach((n) => {
          const freq = 440 * Math.pow(2, (notes.indexOf(n) + (oct - 4) * 12 + 3) / 12);
          if (!n.includes('#')) {
            whiteKeys.push({ n, freq, id: `${n}${oct}`, whiteIndex });
            whiteIndex++;
          } else {
            blackKeys.push({ n, freq, id: `${n}${oct}`, whiteIndexBefore: whiteIndex });
          }
        });
      }
      return { whiteKeys, blackKeys };
    }

    // --- DOM 描画関数 ---
    function renderUI() {
      const t = LANGUAGES[state.lang] || LANGUAGES.ja;
      const isDark = state.theme === 'black';

      // テキスト反映
      document.getElementById('btn-start').innerText = t.start;
      document.getElementById('btn-open-settings').innerText = t.settings;
      document.getElementById('btn-open-login').innerText = state.isVip ? t.logout : t.login;
      document.getElementById('btn-exit').innerText = t.exit;
      document.getElementById('lbl-settings-heading').innerText = t.settings;
      document.getElementById('lbl-login-heading').innerText = t.login;
      document.getElementById('lbl-lang').innerText = t.lang;
      document.getElementById('lbl-theme').innerText = t.theme;
      document.getElementById('lbl-keywidth').innerText = t.keyWidth;
      document.getElementById('lbl-volume').innerText = t.volume;
      document.getElementById('lbl-tone-title').innerText = t.tone;
      document.getElementById('btn-theme-black').innerText = t.black;
      document.getElementById('btn-theme-white').innerText = t.white;

      // テーマ適用
      const pianoScreen = document.getElementById('piano-screen');
      const startScreen = document.getElementById('start-screen');
      const toneBar = document.getElementById('tone-selector-bar');
      const bottomBar = document.getElementById('bottom-bar');
      const settingsCard = document.getElementById('settings-card');
      const loginCard = document.getElementById('login-card');

      if (isDark) {
        pianoScreen.className = "h-[100dvh] flex flex-col select-none overflow-hidden bg-black text-zinc-400";
        startScreen.className = "fixed inset-0 flex flex-col items-center justify-center p-6 bg-[#020202] text-white z-[300]";
        toneBar.className = "border-b border-zinc-900 p-2.5 z-[100] overflow-y-auto max-h-[36vh] custom-scrollbar bg-zinc-950/90";
        bottomBar.className = "p-4 flex items-center justify-between border-t border-zinc-900 bg-zinc-950 shrink-0";
        settingsCard.className = "p-8 rounded-3xl w-full max-w-sm border border-zinc-800 bg-zinc-950 text-white shadow-2xl";
        loginCard.className = "p-8 rounded-3xl w-full max-w-sm border border-zinc-800 bg-zinc-950 text-white shadow-2xl";
      } else {
        pianoScreen.className = "h-[100dvh] flex flex-col select-none overflow-hidden bg-slate-100 text-slate-600";
        startScreen.className = "fixed inset-0 flex flex-col items-center justify-center p-6 bg-slate-100 text-slate-900 z-[300]";
        toneBar.className = "border-b border-slate-200 p-2.5 z-[100] overflow-y-auto max-h-[36vh] custom-scrollbar bg-white/90";
        bottomBar.className = "p-4 flex items-center justify-between border-t border-slate-200 bg-white shrink-0";
        settingsCard.className = "p-8 rounded-3xl w-full max-w-sm border border-slate-200 bg-white text-slate-900 shadow-2xl";
        loginCard.className = "p-8 rounded-3xl w-full max-w-sm border border-slate-200 bg-white text-slate-900 shadow-2xl";
      }

      renderToneSelector();
      renderKeyboard();
    }

    function renderToneSelector() {
      const container = document.getElementById('tone-groups-container');
      container.innerHTML = '';

      Object.entries(SOUND_GROUPS).forEach(([cat, sounds]) => {
        const groupDiv = document.createElement('div');
        groupDiv.className = 'flex flex-col gap-1 min-w-[85px]';

        const title = document.createElement('span');
        title.className = `text-[7px] font-black uppercase tracking-tighter truncate px-0.5 ${cat === 'VIP_SPECIAL' ? 'text-amber-500' : state.theme === 'black' ? 'text-zinc-500' : 'text-slate-400'}`;
        title.innerText = cat;
        groupDiv.appendChild(title);

        sounds.forEach(s => {
          const locked = s.vip && !state.isVip;
          const isSelected = state.activeTone.id === s.id;
          const btn = document.createElement('button');
          btn.disabled = locked;

          let btnClass = "h-7 rounded-md text-[8px] font-bold border transition-all truncate px-1 flex items-center justify-center ";
          if (locked) {
            btnClass += "opacity-20 cursor-not-allowed border-transparent";
          } else if (isSelected) {
            btnClass += "bg-indigo-600 text-white border-indigo-500 shadow-md";
          } else if (state.theme === 'black') {
            btnClass += "bg-zinc-900/80 border-zinc-800 text-zinc-400 hover:border-zinc-600";
          } else {
            btnClass += "bg-slate-50 border-slate-200 text-slate-700 hover:border-slate-300";
          }

          btn.className = btnClass;
          btn.innerText = locked ? "🔒" : s.n;
          btn.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            state.activeTone = s;
            document.getElementById('current-tone-name').innerText = s.n;
            renderToneSelector();
          });
          groupDiv.appendChild(btn);
        });

        container.appendChild(groupDiv);
      });
    }

    function renderKeyboard() {
      const { whiteKeys, blackKeys } = buildPianoKeys();
      const wrapper = document.getElementById('piano-keys-wrapper');
      const whiteContainer = document.getElementById('white-keys-container');
      const blackContainer = document.getElementById('black-keys-container');

      wrapper.style.width = (whiteKeys.length * state.keyWidth) + 'px';
      whiteContainer.innerHTML = '';
      blackContainer.innerHTML = '';

      const isDark = state.theme === 'black';

      // 白鍵描画 (pointerdown単一登録で二重音排除)
      whiteKeys.forEach((k) => {
        const key = document.createElement('div');
        key.className = `rounded-b-lg border-r border-b flex-shrink-0 active:bg-indigo-200 transition-all flex items-end justify-center pb-4 active:translate-y-1 shadow-md ${
          isDark ? 'bg-zinc-100 border-zinc-300' : 'bg-white border-slate-300'
        }`;
        key.style.width = state.keyWidth + 'px';
        key.style.height = '100%';
        key.style.touchAction = 'none';

        if (k.n === 'C') {
          const label = document.createElement('span');
          label.className = 'text-[9px] font-black text-slate-400 uppercase opacity-60';
          label.innerText = k.id;
          key.appendChild(label);
        }

        key.addEventListener('pointerdown', (e) => playNote(k.freq, e));
        whiteContainer.appendChild(key);
      });

      // 黒鍵描画 (pointerdown単一登録で二重音排除)
      blackKeys.forEach((k) => {
        const bw = state.keyWidth * 0.65;
        const left = (k.whiteIndexBefore * state.keyWidth) - (bw / 2);
        const key = document.createElement('div');
        key.className = 'absolute bg-gradient-to-b from-zinc-800 to-black rounded-b-md shadow-lg border-x border-black pointer-events-auto active:from-indigo-900 transition-all';
        key.style.width = bw + 'px';
        key.style.height = '60%';
        key.style.left = left + 'px';
        key.style.top = '0';
        key.style.touchAction = 'none';

        key.addEventListener('pointerdown', (e) => playNote(k.freq, e));
        blackContainer.appendChild(key);
      });
    }

    // --- イベントリスナー設定 ---
    document.getElementById('btn-start').addEventListener('click', () => {
      initAudio();
      document.getElementById('start-screen').classList.add('hidden');
      document.getElementById('piano-screen').classList.remove('hidden');
    });

    document.getElementById('btn-exit').addEventListener('click', () => {
      document.getElementById('piano-screen').classList.add('hidden');
      document.getElementById('start-screen').classList.remove('hidden');
    });

    document.getElementById('btn-open-settings').addEventListener('click', () => {
      document.getElementById('settings-modal').classList.remove('hidden');
    });

    document.getElementById('btn-close-settings').addEventListener('click', () => {
      document.getElementById('settings-modal').classList.add('hidden');
    });

    document.getElementById('btn-open-login').addEventListener('click', () => {
      if (state.isVip) {
        state.isVip = false;
        renderUI();
      } else {
        document.getElementById('login-modal').classList.remove('hidden');
      }
    });

    document.getElementById('btn-submit-login').addEventListener('click', () => {
      state.isVip = true;
      document.getElementById('login-modal').classList.add('hidden');
      renderUI();
    });

    document.getElementById('select-lang').addEventListener('change', (e) => {
      state.lang = e.target.value;
      renderUI();
    });

    document.getElementById('btn-theme-black').addEventListener('click', () => {
      state.theme = 'black';
      document.getElementById('btn-theme-black').className = 'py-3 rounded-xl text-xs font-bold border transition-all bg-indigo-600 text-white border-indigo-500';
      document.getElementById('btn-theme-white').className = 'py-3 rounded-xl text-xs font-bold border transition-all bg-zinc-900 text-zinc-400 border-zinc-800';
      renderUI();
    });

    document.getElementById('btn-theme-white').addEventListener('click', () => {
      state.theme = 'white';
      document.getElementById('btn-theme-white').className = 'py-3 rounded-xl text-xs font-bold border transition-all bg-indigo-600 text-white border-indigo-500';
      document.getElementById('btn-theme-black').className = 'py-3 rounded-xl text-xs font-bold border transition-all bg-slate-100 text-slate-700 border-slate-300';
      renderUI();
    });

    document.getElementById('slider-keywidth').addEventListener('input', (e) => {
      state.keyWidth = Number(e.target.value);
      renderKeyboard();
    });

    document.getElementById('slider-volume').addEventListener('input', (e) => {
      state.volume = Number(e.target.value);
      if (masterGain) masterGain.gain.value = state.volume / 100;
    });

    // 初期化実行
    renderUI();
  </script>
</body>
</html>
